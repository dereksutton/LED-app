services:
  # Backend API server
  - type: web
    name: led-app-api
    env: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NODE_ENV
        value: production
      - key: RESEND_FROM_EMAIL
        value: quotes@ledcustompainting.com
    healthCheckPath: /health
    autoDeploy: false

  # Frontend static site
  - type: web
    name: led-app-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /send-quote
        destination: https://led-app-api.onrender.com/send-quote
      - type: rewrite
        source: /quote-requests
        destination: https://led-app-api.onrender.com/quote-requests
      - type: rewrite
        source: /health
        destination: https://led-app-api.onrender.com/health
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: false
